<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <article data-testid="test-todo-card">
      <h2 data-testid="test-todo-title">Complete UI Card Design</h2>
      <p data-testid="test-todo-description">
        Build a clean, accessible, and testable Todo card component using proper
        semantic HTML.
      </p>

      <div class="badges">
        <span
          class="badge priority"
          data-testid="test-todo-priority"
          aria-label="Priority: High"
        >
          High
        </span>

        <span
          class="badge status"
          data-testid="test-todo-status"
          aria-label="Status: Pending"
        >
          Pending
        </span>
      </div>

      <div class="meta">
        <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00:00Z">
          Due April 16, 2026
        </time>

        <time data-testid="test-todo-time-remaining" aria-live="polite">
          Calculating…
        </time>
      </div>

      <ul class="tags" data-testid="test-todo-tags" role="list">
        <li class="tag" data-testid="test-todo-tag-work">Work</li>
        <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>

      <div class="actions">
        <label>
          <input
            type="checkbox"
            data-testid="test-todo-complete-toggle"
            aria-label="Mark task as complete"
            
          />
          <span>Complete</span>
        </label>
        <div class="btn">
          <button data-testid="test-todo-edit-button" aria-label="Edit task">
            Edit
          </button>

          <button
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            onclick="alert('Delete clicked')"
            class="delBtn"
          >
            Delete
          </button>
        </div>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
