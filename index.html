<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Todo Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <article data-testid="test-todo-card">
      <h2 data-testid="test-todo-title">Complete UI Card Design</h2>

      <div id="todo-collapsible" data-testid="test-todo-collapsible-section">
        <p data-testid="test-todo-description">
          Build a clean, accessible, and testable Todo card component using
          proper semantic HTML.
        </p>
      </div>

      <button
        data-testid="test-todo-expand-toggle"
        aria-expanded="false"
        aria-controls="todo-collapsible"
        class="expand"
      >
        Show more
      </button>

      <div class="badges">
        <span class="badge priority" data-testid="test-todo-priority"
          >High</span
        >
        <div
          class="priority-indicator high"
          data-testid="test-todo-priority-indicator"
        ></div>
        <span class="badge status" data-testid="test-todo-status">Pending</span>
      </div>

      <label class="visually-hidden" for="status-control">Status</label>
      <select id="status-control" data-testid="test-todo-status-control">
        <option>Pending</option>
        <option>In Progress</option>
        <option>Done</option>
      </select>

      <div class="meta">
        <time data-testid="test-todo-due-date"></time>
        <time data-testid="test-todo-time-remaining" aria-live="polite"></time>
      </div>

      <span class="overdue hidden" data-testid="test-todo-overdue-indicator">
        Overdue
      </span>

      <ul class="tags" data-testid="test-todo-tags">
        <li class="tag" data-testid="test-todo-tag-work">Work</li>
        <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
      </ul>

      <div class="actions">
        <label>
          <input type="checkbox" data-testid="test-todo-complete-toggle" />
          Complete
        </label>

        <div class="btn">
          <button data-testid="test-todo-edit-button">Edit</button>
          <button
            class="delBtn"
            data-testid="test-todo-delete-button"
            aria-label="Delete task"
            onclick="alert('Delete Clicked')"
          >
            Delete
          </button>
        </div>
      </div>

      <form class="edit-form hidden" data-testid="test-todo-edit-form">
        <label>
          Title:
          <input data-testid="test-todo-edit-title-input" />
        </label>

        <label>
          Description:
          <textarea data-testid="test-todo-edit-description-input"></textarea>
        </label>

        <label>
          Priority:
          <select data-testid="test-todo-edit-priority-select">
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
          </select>
        </label>

        <label>
          Date:
          <input
            type="datetime-local"
            data-testid="test-todo-edit-due-date-input"
          />
        </label>

        <button type="button" data-testid="test-todo-save-button">Save</button>
        <button type="button" data-testid="test-todo-cancel-button">
          Cancel
        </button>
      </form>
    </article>

    <script src="script.js"></script>
  </body>
</html>
